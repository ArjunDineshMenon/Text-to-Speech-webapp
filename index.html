<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleek Text-to-Speech</title>
    <style>
        :root {
            --bg-page: #121212;
            --bg-container: #1e1e24;
            --bg-input: #2d2d35;
            --text-main: #f1f1f1;
            --border-muted: #44444c;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --secondary: #4b5563;
            --secondary-hover: #374151;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --shadow-soft: 0 10px 30px rgba(0,0,0,0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-page);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--bg-container);
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--shadow-soft);
            width: 100%;
            max-width: 600px; /* Made slightly wider to fit buttons */
            border: 1px solid var(--border-muted);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h2 {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        h2 span { color: var(--accent); }

        textarea, select {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            background-color: var(--bg-input);
            color: var(--text-main);
            border: 1px solid var(--border-muted);
            font-size: 16px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        textarea:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
        }

        textarea {
            height: 200px;
            resize: none;
            line-height: 1.6;
        }

        select {
            cursor: pointer;
            appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg fill="white" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/><path d="M0 0h24v24H0z" fill="none"/></svg>');
            background-repeat: no-repeat;
            background-position-x: calc(100% - 15px);
            background-position-y: center;
        }

        /* --- New Button Group Styling --- */
        .button-group {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        button {
            flex: 1; /* Makes all buttons take up equal space */
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            color: white;
        }

        button:active { transform: translateY(2px); }

        /* Specific Button Colors */
        .btn-play { background-color: var(--accent); }
        .btn-play:hover { background-color: var(--accent-hover); }

        .btn-secondary { background-color: var(--secondary); }
        .btn-secondary:hover { background-color: var(--secondary-hover); }

        .btn-danger { background-color: var(--danger); }
        .btn-danger:hover { background-color: var(--danger-hover); }

    </style>
</head>
<body>

    <div class="container">
        <h2>Speak <span>Out</span> Loud</h2>
        
        <textarea id="text-input" placeholder="Enter text to speak...">The ancient forest stood as a quiet testament to time, its towering redwoods filtering the golden afternoon sunlight into a mosaic of vibrant green...</textarea>
        
        <select id="voice-select">
            <option value="">Loading voices...</option>
        </select>
        
        <div class="button-group">
            <button id="play-btn" class="btn-play">Play</button>
            <button id="pause-btn" class="btn-secondary">Pause</button>
            <button id="resume-btn" class="btn-secondary">Resume</button>
            <button id="stop-btn" class="btn-danger">Stop</button>
        </div>
    </div>

    <script>
        const synth = window.speechSynthesis;
        const textInput = document.getElementById('text-input');
        const voiceSelect = document.getElementById('voice-select');
        
        // Grab all our new buttons
        const playBtn = document.getElementById('play-btn');
        const pauseBtn = document.getElementById('pause-btn');
        const resumeBtn = document.getElementById('resume-btn');
        const stopBtn = document.getElementById('stop-btn');
        
        let voices = [];

        function populateVoiceList() {
            voices = synth.getVoices();
            voiceSelect.innerHTML = ''; 

            if (voices.length === 0) {
                const option = document.createElement('option');
                option.textContent = "No voices found (is this feature available?)";
                voiceSelect.appendChild(option);
                return;
            }

            voices.forEach((voice) => {
                const option = document.createElement('option');
                option.textContent = `${voice.name} (${voice.lang})`;
                option.setAttribute('data-name', voice.name); 
                voiceSelect.appendChild(option);
            });
        }

        populateVoiceList();
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = populateVoiceList;
        }

        // 1. PLAY BUTTON
        playBtn.addEventListener('click', () => {
            if (textInput.value !== '') {
                // If it's already speaking, cancel the current speech so they don't overlap
                if (synth.speaking) {
                    synth.cancel();
                }
                
                const utterance = new SpeechSynthesisUtterance(textInput.value);
                const selectedVoiceName = voiceSelect.selectedOptions[0].getAttribute('data-name');
                const selectedVoice = voices.find(voice => voice.name === selectedVoiceName);
                
                if (selectedVoice) {
                    utterance.voice = selectedVoice;
                }
                
                synth.speak(utterance);
            }
        });

        // 2. PAUSE BUTTON
        pauseBtn.addEventListener('click', () => {
            if (synth.speaking && !synth.paused) {
                synth.pause();
            }
        });

        // 3. RESUME BUTTON
        resumeBtn.addEventListener('click', () => {
            if (synth.paused) {
                synth.resume();
            }
        });

        // 4. STOP (START FROM BEGINNING) BUTTON
        stopBtn.addEventListener('click', () => {
            // Cancel completely wipes the current queue. 
            // If you hit play again, it starts from the very beginning.
            synth.cancel();
        });
    </script>

</body>
</html>

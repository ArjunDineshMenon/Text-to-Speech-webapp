<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleek Text-to-Speech</title>
    <style>
        :root {
            --bg-page: #121212;
            --bg-container: #1e1e24;
            --bg-input: #2d2d35;
            --text-main: #f1f1f1;
            --border-muted: #44444c;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --secondary: #4b5563;
            --secondary-hover: #374151;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --shadow-soft: 0 10px 30px rgba(0,0,0,0.5);
            --highlight: #fde047;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-page);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--bg-container);
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--shadow-soft);
            width: 100%;
            max-width: 600px;
            border: 1px solid var(--border-muted);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        h2 { font-size: 28px; }
        h2 span { color: var(--accent); }

        .btn-small {
            padding: 8px 14px;
            font-size: 14px;
            border-radius: 8px;
            flex: none; 
        }

        textarea, select {
            width: 100%; padding: 15px; border-radius: 12px;
            background-color: var(--bg-input); color: var(--text-main);
            border: 1px solid var(--border-muted); font-size: 16px;
        }

        textarea:focus, select:focus {
            outline: none; border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
        }

        textarea { height: 150px; resize: none; line-height: 1.6; }
        textarea::selection { background-color: var(--highlight); color: #121212; }

        select {
            cursor: pointer; appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg fill="white" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/><path d="M0 0h24v24H0z" fill="none"/></svg>');
            background-repeat: no-repeat; background-position-x: calc(100% - 15px);
            background-position-y: center;
        }

        .sliders { display: flex; gap: 20px; background: var(--bg-input); padding: 15px 20px; border-radius: 12px; border: 1px solid var(--border-muted); }
        .slider-group { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .slider-group label { font-size: 14px; font-weight: 600; color: #aaa; display: flex; justify-content: space-between; }
        .slider-group span { color: var(--text-main); }

        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%;
            background: var(--accent); cursor: pointer; margin-top: -6px;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: var(--border-muted); border-radius: 2px; }

        .button-group { display: flex; gap: 10px; width: 100%; }
        button { flex: 1; padding: 14px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; color: white; transition: all 0.2s; }
        button:active { transform: translateY(2px); }
        .btn-play { background-color: var(--accent); } .btn-play:hover { background-color: var(--accent-hover); }
        .btn-secondary { background-color: var(--secondary); } .btn-secondary:hover { background-color: var(--secondary-hover); }
        .btn-danger { background-color: var(--danger); } .btn-danger:hover { background-color: var(--danger-hover); }

    </style>
</head>
<body>

    <div class="container">
        <div class="header-row">
            <h2>Speak <span>Out</span> Loud</h2>
            <input type="file" id="file-upload" accept=".txt" style="display: none;">
            <button id="upload-btn" class="btn-secondary btn-small">Upload .txt</button>
        </div>
        
        <textarea id="text-input" placeholder="Enter text or upload a file to speak..."></textarea>
        <select id="voice-select"><option value="">Loading voices...</option></select>
        
        <div class="sliders">
            <div class="slider-group">
                <label for="volume-slider">Volume <span id="volume-value">100%</span></label>
                <input type="range" id="volume-slider" min="0" max="1" value="1" step="0.1">
            </div>
            <div class="slider-group">
                <label for="speed-slider">Speed <span id="speed-value">1.0x</span></label>
                <input type="range" id="speed-slider" min="0.5" max="2" value="1" step="0.1">
            </div>
        </div>

        <div class="button-group">
            <button id="play-pause-btn" class="btn-play">Play</button>
            <button id="stop-btn" class="btn-danger">Stop</button>
            <button id="clear-btn" class="btn-secondary">Clear</button>
        </div>
    </div>

    <script>
        const synth = window.speechSynthesis;
        const textInput = document.getElementById('text-input');
        const voiceSelect = document.getElementById('voice-select');
        
        const playPauseBtn = document.getElementById('play-pause-btn');
        const stopBtn = document.getElementById('stop-btn');
        const clearBtn = document.getElementById('clear-btn');
        
        const fileUpload = document.getElementById('file-upload');
        const uploadBtn = document.getElementById('upload-btn');
        
        const volumeSlider = document.getElementById('volume-slider');
        const speedSlider = document.getElementById('speed-slider');
        const volumeValue = document.getElementById('volume-value');
        const speedValue = document.getElementById('speed-value');

        let absoluteStartIndex = 0; 
        let currentUtteranceIndex = 0;
        let activeUtteranceId = 0; 
        let voices = [];

        // --- NEW LOCALSTORAGE INITIALIZATION ---
        // Check if there is saved text when the page loads
        const savedText = localStorage.getItem('tts_saved_text');
        if (savedText) {
            textInput.value = savedText;
        } else {
            // Default placeholder text if nothing is saved
            textInput.value = "The ancient forest stood as a quiet testament to time, its towering redwoods filtering the golden afternoon sunlight into a mosaic of vibrant green.";
        }

        // --- AUTOSAVE EVENT LISTENER ---
        // Save the text every time the user types or pastes something
        textInput.addEventListener('input', () => {
            localStorage.setItem('tts_saved_text', textInput.value);
        });


        volumeSlider.addEventListener('input', () => { volumeValue.textContent = Math.round(volumeSlider.value * 100) + '%'; });
        speedSlider.addEventListener('input', () => { speedValue.textContent = speedSlider.value + 'x'; });

        function populateVoiceList() {
            voices = synth.getVoices();
            voiceSelect.innerHTML = ''; 
            voices.forEach((voice) => {
                const option = document.createElement('option');
                option.textContent = `${voice.name} (${voice.lang})`;
                option.setAttribute('data-name', voice.name); 
                voiceSelect.appendChild(option);
            });
        }
        populateVoiceList();
        if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = populateVoiceList;

        function clearHighlight() {
            textInput.setSelectionRange(0, 0);
            textInput.blur();
        }

        uploadBtn.addEventListener('click', () => {
            fileUpload.click();
        });

        fileUpload.addEventListener('change', (event) => {
            const file = event.target.files[0];
            
            if (file) {
                const reader = new FileReader();
                
                reader.onload = (e) => {
                    textInput.value = e.target.result; 
                    
                    // Trigger the autosave when a file is uploaded too!
                    localStorage.setItem('tts_saved_text', textInput.value);
                    
                    activeUtteranceId++;
                    synth.cancel();
                    playPauseBtn.textContent = 'Play';
                    clearHighlight();
                    absoluteStartIndex = 0;
                };
                
                reader.readAsText(file);
                fileUpload.value = ''; 
            }
        });

        function startSpeaking(textToSpeak) {
            activeUtteranceId++; 
            const myId = activeUtteranceId;
            
            if (synth.speaking) {
                synth.cancel(); 
            }

            currentUtteranceIndex = 0;

            const utterance = new SpeechSynthesisUtterance(textToSpeak);
            utterance.volume = parseFloat(volumeSlider.value);
            utterance.rate = parseFloat(speedSlider.value);
            
            const selectedVoiceName = voiceSelect.selectedOptions[0].getAttribute('data-name');
            const selectedVoice = voices.find(voice => voice.name === selectedVoiceName);
            if (selectedVoice) utterance.voice = selectedVoice;
            
            utterance.onboundary = (event) => {
                if (event.name === 'word') {
                    currentUtteranceIndex = event.charIndex;
                    const actualIndex = absoluteStartIndex + currentUtteranceIndex;
                    textInput.focus();
                    textInput.setSelectionRange(actualIndex, actualIndex + event.charLength);
                }
            };

            utterance.onend = () => {
                if (myId === activeUtteranceId) {
                    playPauseBtn.textContent = 'Play'; 
                    clearHighlight();
                    absoluteStartIndex = 0; 
                }
            };
            
            playPauseBtn.textContent = 'Pause'; 
            
            setTimeout(() => {
                synth.speak(utterance);
            }, 50);
        }

        playPauseBtn.addEventListener('click', () => {
            if (textInput.value === '') return; 

            if (synth.speaking) {
                if (synth.paused) {
                    synth.resume();
                    playPauseBtn.textContent = 'Pause';
                } else {
                    synth.pause();
                    playPauseBtn.textContent = 'Resume';
                }
            } else {
                absoluteStartIndex = 0;
                currentUtteranceIndex = 0;
                startSpeaking(textInput.value);
            }
        });

        function handleLiveUpdate() {
            if (synth.speaking && !synth.paused) {
                absoluteStartIndex += currentUtteranceIndex;
                const remainingText = textInput.value.substring(absoluteStartIndex);
                
                if (remainingText.length > 0) {
                    startSpeaking(remainingText);
                }
            }
        }

        volumeSlider.addEventListener('change', handleLiveUpdate);
        speedSlider.addEventListener('change', handleLiveUpdate);

        stopBtn.addEventListener('click', () => {
            activeUtteranceId++; 
            synth.cancel();
            playPauseBtn.textContent = 'Play'; 
            clearHighlight();
            absoluteStartIndex = 0;
        });

        clearBtn.addEventListener('click', () => {
            textInput.value = ''; 
            
            // --- NEW: Remove from local storage ---
            localStorage.removeItem('tts_saved_text');
            
            activeUtteranceId++; 
            synth.cancel(); 
            playPauseBtn.textContent = 'Play'; 
            clearHighlight();
            absoluteStartIndex = 0;
        });
    </script>
</body>
</html>
